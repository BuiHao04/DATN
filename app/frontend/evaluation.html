<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Evaluation</title><script src='https://cdn.tailwindcss.com'></script></head><body class='bg-slate-50 text-slate-900'><div class='max-w-5xl mx-auto p-6'><h1 class='text-2xl font-bold mb-4'>Evaluation</h1><form id='ev' class='bg-white border rounded p-4 space-y-2'><input class='w-full border rounded px-3 py-2' name='pred_json' placeholder='src/outputs/ocr_result.json' required><input class='w-full border rounded px-3 py-2' name='gt_json' placeholder='src/data/ground_truth.json' required><input class='w-full border rounded px-3 py-2' name='output_eval' placeholder='src/outputs/eval_report.json' required><button class='px-4 py-2 bg-blue-600 text-white rounded'>Run Evaluate</button></form><pre id='out' class='mt-4 text-xs bg-slate-100 p-3 rounded'></pre></div><script>document.getElementById('ev').onsubmit=async(e)=>{e.preventDefault();const f=new FormData(e.target);const r=await fetch('/api/jobs',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({mode:'evaluate',args:{pred_json:f.get('pred_json'),gt_json:f.get('gt_json'),output_eval:f.get('output_eval')}})});document.getElementById('out').textContent=JSON.stringify(await r.json(),null,2)}</script></body></html>
