<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Run History</title><script src='https://cdn.tailwindcss.com'></script></head><body class='bg-slate-50 text-slate-900'><div class='max-w-6xl mx-auto p-6'><h1 class='text-2xl font-bold mb-4'>Run History</h1><button id='refresh' class='px-3 py-2 bg-blue-600 text-white rounded mb-3'>Refresh</button><pre id='out' class='text-xs bg-white border rounded p-4 overflow-auto h-[70vh]'></pre></div><script>async function load(){const r=await fetch('/api/jobs');document.getElementById('out').textContent=JSON.stringify(await r.json(),null,2)};document.getElementById('refresh').onclick=load;load();</script></body></html>
