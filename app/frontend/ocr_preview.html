<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>OCR Preview</title><script src='https://cdn.tailwindcss.com'></script></head><body class='bg-slate-50 text-slate-900'><div class='max-w-6xl mx-auto p-6'><h1 class='text-2xl font-bold mb-4'>OCR Preview</h1><div class='mb-4 flex gap-2'><a class='px-3 py-2 bg-white border rounded' href='/frontend/dashboard.html'>Dashboard</a><a class='px-3 py-2 bg-white border rounded' href='/frontend/labeling_workspace.html'>Labeling Workspace</a></div><div class='grid grid-cols-1 md:grid-cols-2 gap-4'><div class='bg-white border rounded p-4'><h2 class='font-semibold mb-2'>Run OCR infer</h2><form id='inferForm' class='space-y-2'><input class='w-full border rounded px-3 py-2' name='image' placeholder='src/data/anh_test.jpg' required><select class='w-full border rounded px-3 py-2' name='mode'><option value='gcn_infer'>gcn_infer</option><option value='pretrained'>pretrained</option></select><button class='px-4 py-2 bg-blue-600 text-white rounded'>Run</button></form><pre id='inferOut' class='mt-3 text-xs bg-slate-100 p-3 rounded overflow-auto'></pre></div><div class='bg-white border rounded p-4'><h2 class='font-semibold mb-2'>Recent jobs</h2><pre id='jobs' class='text-xs bg-slate-100 p-3 rounded h-80 overflow-auto'></pre></div></div></div><script>
async function refreshJobs(){const r=await fetch('/api/jobs');const d=await r.json();document.getElementById('jobs').textContent=JSON.stringify(d,null,2)}
document.getElementById('inferForm').onsubmit=async(e)=>{e.preventDefault();const f=new FormData(e.target);const body={mode:f.get('mode'),args:{image:f.get('image'),lang:'en'}};const r=await fetch('/api/jobs',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});const d=await r.json();document.getElementById('inferOut').textContent=JSON.stringify(d,null,2);refreshJobs()};
refreshJobs();
</script></body></html>
