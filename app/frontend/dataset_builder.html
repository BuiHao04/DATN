<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Dataset Builder</title><script src='https://cdn.tailwindcss.com'></script></head><body class='bg-slate-50 text-slate-900'><div class='max-w-5xl mx-auto p-6'><h1 class='text-2xl font-bold mb-4'>Dataset Builder (CSV -> JSON)</h1><form id='form' class='bg-white border rounded p-4 space-y-2'><input class='w-full border rounded px-3 py-2' name='input_csv' placeholder='src/data/labeling_stage_b/nodes_to_label.csv' required><input class='w-full border rounded px-3 py-2' name='output_json' placeholder='src/data/stage_b_vi_dataset.json' required><button class='px-4 py-2 bg-blue-600 text-white rounded'>Convert</button></form><pre id='out' class='mt-4 text-xs bg-slate-100 p-3 rounded'></pre></div><script>document.getElementById('form').onsubmit=async(e)=>{e.preventDefault();const f=new FormData(e.target);const r=await fetch('/api/jobs',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({mode:'preprocess_gcn_dataset',args:{input_csv:f.get('input_csv'),output_json:f.get('output_json')}})});document.getElementById('out').textContent=JSON.stringify(await r.json(),null,2)}</script></body></html>
